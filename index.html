<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>やることリスト</title>
		<link rel="stylesheet" href="style.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<button id="theme-toggle" aria-label="Toggle Dark Mode">
			<span class="icon sun"><i class="fa-solid fa-sun"></i></span>
		</button>
		<button id="lang-toggle" aria-label="Toggle Language">English</button>
		<main class="app-container">
			<h1 class="heading">やることリスト</h1>
			<div class="input-group">
				<input
					type="text"
					id="todo-input"
					placeholder="新しいタスクを追加してください"
				/>
				<button id="add-btn">追加</button>
			</div>

			<p id="error-msg"></p>

			<ul id="todo-list"></ul>

			<template id="task-template">
				<li>
					<span class="task-text"></span>
					<button class="delete-btn">削除</button>
				</li>
			</template>
		</main>
		<script src="script.js"></script>
	</body>
</html>
